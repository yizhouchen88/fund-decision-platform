services:
  - type: web
    name: fund-decision-platform
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: APP_URL
        value: https://fund-decision-platform.onrender.com
      - key: DATABASE_PATH
        value: /app/data/fund-platform.db
      - key: ADMIN_REFRESH_SECRET
        generateValue: true
      - key: ENABLE_INTERNAL_CRON
        value: "false"
      - key: CRON_EXPRESSION
        value: "0 */6 * * *"
